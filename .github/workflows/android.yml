name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android (APK/AAB)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: true
      ANDROID_PLATFORM: "34"
      ANDROID_BUILD_TOOLS: "34.0.0"
      ANDROID_NDK_VERSION: "26.1.10909125"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        shell: bash
        run: |
          SDKMANAGER="$(command -v sdkmanager || true)"
          if [ -z "$SDKMANAGER" ] && [ -n "${ANDROID_SDK_ROOT:-}" ]; then
            SDKMANAGER="$(ls -1d "${ANDROID_SDK_ROOT}"/cmdline-tools/*/bin/sdkmanager 2>/dev/null | head -n 1)"
          fi
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found in PATH or ANDROID_SDK_ROOT" >&2
            exit 1
          fi

          # Under GitHub Actions bash runs with `-o pipefail`, `yes` often ends with SIGPIPE
          # once sdkmanager closes stdin, which would fail the step. Tolerate that.
          yes | "$SDKMANAGER" --sdk_root="${ANDROID_SDK_ROOT}" --licenses > /dev/null || true

          "$SDKMANAGER" --sdk_root="${ANDROID_SDK_ROOT}" \
            "platform-tools" \
            "platforms;android-${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libssl-dev \
            pkg-config

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Re-initialize Android project (CI)
        shell: bash
        run: |
          rm -rf src-tauri/gen/android
          pnpm tauri android init --ci --skip-targets-install

      - name: Build Android (Debug APK)
        run: pnpm tauri android build --ci --debug --apk true --aab false

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
